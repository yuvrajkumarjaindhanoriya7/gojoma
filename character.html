<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojoma AAA Asset Factory Studio v9.5</title>
    <style>
        :root {
            --bg-base: #05070f;
            --bg-surface: #0e1122;
            --bg-input: #020307;
            --accent-purple: #a855f7;
            --accent-blue: #38bdf8;
            --accent-green: #00ff66;
            --text-main: #94a3b8;
            --text-bright: #ffffff;
            --border: #1e293b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* LEFT CONFIGURATION PANELS */
        #factory-config-panel {
            width: 400px; background: var(--bg-surface);
            border-right: 2px solid var(--border);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .panel-header { padding: 20px; background: #080a14; border-bottom: 1px solid var(--border); }
        .panel-header h1 { margin: 0; font-size: 15px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 1px; }
        
        .scroll-settings { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .setting-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; }
        
        .input-box, .select-box {
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-bright); padding: 8px 12px; font-size: 12px; border-radius: 4px; outline: none;
        }
        .input-box:focus, .select-box:focus { border-color: var(--accent-purple); }

        .btn {
            background: var(--accent-purple); color: white; border: none;
            padding: 10px 16px; border-radius: 4px; font-size: 12px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: background 0.2s;
            text-align: center; margin-top: 10px;
        }
        .btn:hover { background: #9333ea; }

        /* RIGHT PREVIEW WORKSPACE */
        #preview-workspace { flex: 1; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; gap: 20px; }
        .workspace-title { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
        
        #asset-gl-canvas { flex: 1; background: #000; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        
        #export-output-pad {
            height: 140px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--accent-green); font-family: monospace;
            font-size: 12px; padding: 12px; resize: none; outline: none; line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="factory-config-panel">
        <div class="panel-header">
            <h1>Gojoma Asset Studio Suite</h1>
        </div>
        
        <div class="scroll-settings">
            <div class="setting-group">
                <label>Entity Runtime Name ID</label>
                <input type="text" id="entity-name-input" class="input-box" value="heo_companion" oninput="updateAssetVisuals()">
            </div>

            <div class="setting-group">
                <label>Archetype Category Profile</label>
                <select id="entity-archetype-select" class="select-box" onchange="updateAssetVisuals()">
                    <option value="NPC">Non-Playable Companion (NPC)</option>
                    <option value="ENEMY">Hostile Combatant Enemy</option>
                    <option value="ANIMAL">Fauna/Quadruped Wildlife</option>
                    <option value="SAD_STORY_ACTOR">Cinematic Character (Sad/Injured Variant)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Structural Mesh Color Definition</label>
                <select id="entity-color-select" class="select-box" onchange="updateAssetVisuals()">
                    <option value="0x38bdf8">Cyan Blue (Standard Companion)</option>
                    <option value="0xff2e63">Crimson Red (Aggressive Aggro)</option>
                    <option value="0xe2e8f0">Ashen Grey (Melancholic/Sad Story Model)</option>
                    <option value="0xf59e0b">Amber Gold (Wildlife/Animal Variant)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Default Controller Attachment Mode</label>
                <select id="control-swap-flag" class="select-box" onchange="updateAssetVisuals()">
                    <option value="STATIC_AI_DRIVEN">AI Pathfinding (Standard NPC Behavior)</option>
                    <option value="PLAYABLE_ON_STORY_TRIGGER">Playable Swap Capable (Story Hook Triggerable)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Base Movement Speed Vector</label>
                <input type="number" id="entity-speed-input" class="input-box" value="14" oninput="updateAssetVisuals()">
            </div>

            <button class="btn" onclick="generateAssetCodeSnippet()">Export Asset Configuration Data</button>
        </div>
    </div>

    <div id="preview-workspace">
        <div class="workspace-title">Real-Time Model Mesh Blueprint Viewport</div>
        <div id="asset-gl-canvas"></div>
        
        <div class="workspace-title">Generated Gojoma Script Block Output</div>
        <textarea id="export-output-pad" readonly spellcheck="false">// Click export above to construct your matching data configuration strings...</textarea>
    </div>

    <script>
        // --- WEBGL ENVIRONMENT ARCHITECTURE ---
        const viewContainer = document.getElementById("asset-gl-canvas");
        const factoryScene = new THREE.Scene(); factoryScene.background = new THREE.Color(0x020306);
        const viewCam = new THREE.PerspectiveCamera(45, (window.innerWidth - 460) / (window.innerHeight - 280), 0.1, 500);
        viewCam.position.set(0, 3, 7); viewCam.lookAt(0, 0.8, 0);

        const localRenderer = new THREE.WebGLRenderer({ antialias: true });
        localRenderer.setSize(window.innerWidth - 460, window.innerHeight - 280);
        viewContainer.appendChild(localRenderer.domElement);

        factoryScene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const overheadSun = new THREE.DirectionalLight(0xffffff, 1.2); overheadSun.position.set(5, 15, 5); factoryScene.add(overheadSun);
        factoryScene.add(new THREE.GridHelper(20, 20, 0xa855f7, 0x1e293b));

        // Active Mesh Reference Holder
        let activeVisualMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2, 16), new THREE.MeshStandardMaterial({ color: 0x38bdf8 }));
        factoryScene.add(activeVisualMesh);

        function updateAssetVisuals() {
            factoryScene.remove(activeVisualMesh);
            
            const archType = document.getElementById("entity-archetype-select").value;
            const chosenHex = parseInt(document.getElementById("entity-color-select").value);
            const activeMat = new THREE.MeshStandardMaterial({ color: chosenHex, roughness: 0.4 });
            
            // Adjust geometry bounds based on selection profiles
            if (archType === "ANIMAL") {
                // Horizontal orientation mesh block matrix for quadruped structures
                activeVisualMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.8, 1.8), activeMat);
                activeVisualMesh.position.set(0, 0.4, 0);
            } else if (archType === "SAD_STORY_ACTOR") {
                // Tilted slouched visual profile representing weary/injured narrative models
                activeVisualMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.8, 0.9), activeMat);
                activeVisualMesh.rotation.z = 0.25; 
                activeVisualMesh.position.set(0, 0.9, 0);
            } else if (archType === "ENEMY") {
                // Heavily bulked up layout boundaries representing hostile combatants
                activeVisualMesh = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.4, 1.4), activeMat);
                activeVisualMesh.position.set(0, 1.2, 0);
            } else {
                // Default streamlined cylinder proxy structures for standard companion NPCs
                activeVisualMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2.0, 16), activeMat);
                activeVisualMesh.position.set(0, 1.0, 0);
            }
            
            factoryScene.add(activeVisualMesh);
        }

        function generateAssetCodeSnippet() {
            const nameID = document.getElementById("entity-name-input").value;
            const profile = document.getElementById("entity-archetype-select").value;
            const hexColor = document.getElementById("entity-color-select").value;
            const behaviorFlag = document.getElementById("control-swap-flag").value;
            const speed = document.getElementById("entity-speed-input").value;

            const codeSnippet = `// --- CONSTRUCTED MULTI-ARCHETYPE DEFINITION PROFILE ---
define asset_profile named "${nameID}" :
    set asset_archetype ${profile}
    set visual_render_hex ${hexColor}
    set baseline_movement_speed ${speed}
    set controller_swap_capability ${behaviorFlag === "PLAYABLE_ON_STORY_TRIGGER" ? "TRUE" : "FALSE"}

// --- GOJOMA LIVE CONTEXT INTERACTION RUNTIME LOOP ---
if story_event eq swap_trigger_${nameID} :
    execute dynamic_controller_takeover target_entity "${nameID}" tracking_time 45_sec`;

            document.getElementById("export-output-pad").value = codeSnippet;
        }

        // Run animation tick loop step
        function animateStudioView() {
            requestAnimationFrame(animateStudioView);
            activeVisualMesh.rotation.y += 0.01;
            localRenderer.render(factoryScene, viewCam);
        }
        
        updateAssetVisuals();
        animateStudioView();

        window.addEventListener('resize', () => {
            const w = window.innerWidth - 460; const h = window.innerHeight - 280;
            viewCam.aspect = w / h; viewCam.updateProjectionMatrix();
            localRenderer.setSize(w, h);
        });
    </script>
</body>
</html>
