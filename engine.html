<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojoma Engine v9.5 - Production Suite</title>
    <style>
        :root {
            --bg-base: #030408; --bg-surface: #0a0c16; --bg-input: #010204;
            --accent-purple: #a855f7; --accent-green: #00ff66; --accent-blue: #38bdf8;
            --text-main: #94a3b8; --text-bright: #ffffff; --border: #1e293b;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-base);
            font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #engine-header {
            height: 55px; background: var(--bg-surface); border-bottom: 2px solid var(--accent-purple);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
        }
        .branding { font-weight: bold; font-size: 12px; color: var(--accent-purple); text-transform: uppercase; }
        .action-group { display: flex; gap: 8px; align-items: center; }
        .selector-menu {
            background: #121624; color: var(--text-bright); border: 1px solid var(--border);
            font-size: 11px; font-weight: bold; padding: 6px 10px; border-radius: 4px; outline: none;
        }
        .btn {
            background: #1e293b; color: var(--text-bright); border: 1px solid var(--border);
            padding: 6px 14px; font-size: 11px; font-weight: bold; border-radius: 4px;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-success { background: var(--accent-purple); border: none; color: white; }
        
        #studio-workspace { display: flex; flex: 1; height: calc(100vh - 55px); }
        #viewport-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        #canvas-viewport { flex: 1; background: #000; position: relative; overflow: hidden; }
        
        #hud-status-overlay {
            position: absolute; top: 15px; left: 15px; background: rgba(10, 12, 22, 0.9);
            padding: 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--accent-purple);
            color: var(--text-bright); font-family: monospace; z-index: 100;
        }
        #engine-terminal { 
            height: 140px; background: var(--bg-input); padding: 12px; font-family: monospace; 
            font-size: 11px; color: var(--accent-blue); overflow-y: auto; white-space: pre-wrap; border-top: 1px solid var(--border); box-sizing: border-box; 
        }
        #control-pane { width: 50%; display: flex; flex-direction: column; background: #070911; padding: 15px; box-sizing: border-box; gap: 10px; }
        #gojoma-script-pad { 
            flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; 
            color: var(--accent-green); font-family: monospace; font-size: 12px; padding: 12px; resize: none; outline: none; line-height: 1.5; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="engine-header">
        <span class="branding">Gojoma Grand Core Engine v9.5</span>
        <div class="action-group">
            <select id="spawn-asset-selector" class="selector-menu">
                <option value="hero">Asset: Playable Hero Model</option>
                <option value="heo">Asset: Companion NPC (heo)</option>
                <option value="enemy1">Asset: Combat Enemy Mesh</option>
                <option value="sad_actor">Asset: Melancholic Story Actor</option>
                <option value="animal">Asset: Quadruped Creature</option>
            </select>
            <button class="btn btn-success" onclick="spawnAssetForPlacementDrag()">+ Spawn &amp; Drag</button>
            <button class="btn" style="background:#b91c1c; border:none;" onclick="triggerTestStoryHijack()">⚡ Test NPC Playable Switch</button>
            <select id="camera-perspective-mode" class="selector-menu" onchange="switchViewportPerspective()">
                <option value="TPV">Camera: Third-Person View</option>
                <option value="FPV">Camera: First-Person View</option>
            </select>
            <button class="btn" onclick="compileEngineScriptsV95()">Compile &amp; Boot</button>
        </div>
    </div>

    <div id="studio-workspace">
        <div id="viewport-pane">
            <div id="canvas-viewport">
                <div id="hud-status-overlay">
                    <span id="takeover-hud-label" style="color:var(--accent-blue); font-weight:bold;">SYSTEM NOMINAL</span><br>
                    • Move mouse to drag asset lines.<br>
                    • <span style="color:var(--accent-green);">Right-Click</span> to lock object positions.<br>
                    • Middle-Click mouse wheel to toggle Freelook.
                </div>
            </div>
            <div id="engine-terminal">>> Engine core initialized. Use toolbars to manage entity distributions...</div>
        </div>

        <div id="control-pane">
            <textarea id="gojoma-script-pad" spellcheck="false">// --- DYNAMIC ASSET PLACEMENT MANIFEST ---
place asset named "hero" at coordinates(X: 0.00, Y: 1.10, Z: 0.00)

// --- RUNTIME STORY CODES ---
[GAMEPLAY_START]
if hero punch enemy1:
    let enemy health -10

if story_trigger eq emergency_swap:
    execute dynamic_controller_takeover target_entity "heo" tracking_time 15_sec
[GAMEPLAY_END]</textarea>
        </div>
    </div>

    <script>
        // --- 1. CORE THREE.JS PIPELINE SETUP ---
        const viewBlock = document.getElementById("canvas-viewport");
        const masterScene = new THREE.Scene(); masterScene.background = new THREE.Color(0x04050a);
        const coreCamera = new THREE.PerspectiveCamera(50, (window.innerWidth * 0.5) / (window.innerHeight - 175), 0.1, 1000);
        
        const engineRenderer = new THREE.WebGLRenderer({ antialias: true });
        engineRenderer.setSize(window.innerWidth * 0.5, window.innerHeight - 175);
        viewBlock.appendChild(engineRenderer.domElement);

        masterScene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const skySun = new THREE.DirectionalLight(0xffffff, 1.2); skySun.position.set(30, 60, 30); masterScene.add(skySun);
        
        const floorGridPlane = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({ visible: false }));
        floorGridPlane.rotation.x = -Math.PI / 2; masterScene.add(floorGridPlane);
        masterScene.add(new THREE.GridHelper(200, 50, 0xa855f7, 0x131726));

        // Geometric Asset Definitions
        const blueprints = {
            hero: { geo: new THREE.BoxGeometry(1.2, 2.2, 1.2), mat: new THREE.MeshStandardMaterial({ color: 0xa855f7 }) },
            heo: { geo: new THREE.CylinderGeometry(0.5, 0.5, 2.0, 16), mat: new THREE.MeshStandardMaterial({ color: 0x38bdf8 }) },
            enemy1: { geo: new THREE.BoxGeometry(1.4, 2.4, 1.4), mat: new THREE.MeshStandardMaterial({ color: 0xff2e63 }) },
            sad_actor: { geo: new THREE.BoxGeometry(1.0, 1.8, 1.0), mat: new THREE.MeshStandardMaterial({ color: 0x64748b }) },
            animal: { geo: new THREE.BoxGeometry(1.0, 0.8, 1.8), mat: new THREE.MeshStandardMaterial({ color: 0xf59e0b }) }
        };

        const instancedSceneObjectsRegistry = {};
        instancedSceneObjectsRegistry["hero"] = new THREE.Mesh(blueprints.hero.geo, blueprints.hero.mat);
        instancedSceneObjectsRegistry["hero"].position.set(0, 1.1, 0);
        masterScene.add(instancedSceneObjectsRegistry["hero"]);

        // --- 2. INTERACTIVE VISUAL DRAG AND DROP SUBSYSTEM ---
        let activeSelectedDragMesh = null;
        let activeSelectedTypeKey = "";
        const spatialRaycaster = new THREE.Raycaster();
        const screenMouseCoords = new THREE.Vector2();

        viewBlock.addEventListener('contextmenu', e => e.preventDefault());

        function spawnAssetForPlacementDrag() {
            const assetKey = document.getElementById("spawn-asset-selector").value;
            activeSelectedTypeKey = assetKey;

            if (instancedSceneObjectsRegistry[assetKey]) {
                activeSelectedDragMesh = instancedSceneObjectsRegistry[assetKey];
            } else {
                const newMesh = new THREE.Mesh(blueprints[assetKey].geo, blueprints[assetKey].mat);
                masterScene.add(newMesh);
                instancedSceneObjectsRegistry[assetKey] = newMesh;
                activeSelectedDragMesh = newMesh;
            }
            document.getElementById("engine-terminal").innerHTML = `>> [DRAG MODE ACTIVE]: Repositioning object [${assetKey}]. Right-Click to drop.`;
        }

        window.addEventListener('mousemove', (event) => {
            const viewportBounds = engineRenderer.domElement.getBoundingClientRect();
            screenMouseCoords.x = ((event.clientX - viewportBounds.left) / viewportBounds.width) * 2 - 1;
            screenMouseCoords.y = -((event.clientY - viewportBounds.top) / viewportBounds.height) * 2 + 1;

            if (activeSelectedDragMesh && !isPointerLocked) {
                spatialRaycaster.setFromCamera(screenMouseCoords, coreCamera);
                const hits = spatialRaycaster.intersectObject(floorGridPlane);
                if (hits.length > 0) {
                    let verticalOffset = 1.0;
                    if (activeSelectedTypeKey === "hero") verticalOffset = 1.1;
                    if (activeSelectedTypeKey === "enemy1") verticalOffset = 1.2;
                    if (activeSelectedTypeKey === "sad_actor") verticalOffset = 0.9;
                    if (activeSelectedTypeKey === "animal") verticalOffset = 0.4;
                    
                    activeSelectedDragMesh.position.set(hits[0].point.x, verticalOffset, hits[0].point.z);
                }
            }
        });

        window.addEventListener('mousedown', (event) => {
            const viewportBounds = engineRenderer.domElement.getBoundingClientRect();
            if (event.clientX >= viewportBounds.left && event.clientX <= viewportBounds.right &&
                event.clientY >= viewportBounds.top && event.clientY <= viewportBounds.bottom) {
                
                if (event.button === 2 && activeSelectedDragMesh) { // Right Click
                    const px = activeSelectedDragMesh.position.x.toFixed(2);
                    const py = activeSelectedDragMesh.position.y.toFixed(2);
                    const pz = activeSelectedDragMesh.position.z.toFixed(2);
                    
                    document.getElementById("engine-terminal").innerHTML += `\n>> [GRID SYNCED]: Locked ${activeSelectedTypeKey} at (X: ${px}, Y: ${py}, Z: ${pz})`;
                    syncObjectPlacementsToTextArea(activeSelectedTypeKey, px, py, pz);
                    
                    activeSelectedDragMesh = null;
                    activeSelectedTypeKey = "";
                }
            }
        });

        function syncObjectPlacementsToTextArea(name, x, y, z) {
            const pad = document.getElementById("gojoma-script-pad");
            let lines = pad.value.split('\n');
            lines = lines.filter(line => !line.includes(`named "${name}"`));
            lines.unshift(`place asset named "${name}" at coordinates(X: ${x}, Y: ${y}, Z: ${z})`);
            pad.value = lines.join('\n');
        }

        // --- 3. DUAL-PERSPECTIVE MOUSE FREELOOK MATRIX ---
        let mousePitchAngle = 0; let mouseYawAngle = 0;
        let isPointerLocked = false;

        viewBlock.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // Middle Mouse Wheel Button Click
                e.preventDefault();
                if (!isPointerLocked) viewBlock.requestPointerLock();
                else document.exitPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = (document.pointerLockElement === viewBlock);
        });

        document.addEventListener('mousemove', (e) => {
            if (!isPointerLocked) return;
            mouseYawAngle -= e.movementX * 0.003;
            mousePitchAngle -= e.movementY * 0.003;
            mousePitchAngle = Math.max(-Math.PI / 3.3, Math.min(Math.PI / 3.3, mousePitchAngle));
            updateEngineCameraRigVectors();
        });

        // --- 4. RUNTIME STORY HIJACK ENGINE ---
        let operationalPlayerTargetKey = "hero";
        let takeoverActiveFlag = false;
        let takeoverTimerCountdown = 0;

        function triggerTestStoryHijack() {
            if (!instancedSceneObjectsRegistry["heo"]) {
                document.getElementById("engine-terminal").innerHTML += "\n>> Error: Spawn 'heo' onto the field grid layout first!";
                return;
            }
            initiateControllerHijackSequence("heo", 15.0);
        }

        function initiateControllerHijackSequence(targetMeshKey, timeframe) {
            operationalPlayerTargetKey = targetMeshKey;
            takeoverActiveFlag = true;
            takeoverTimerCountdown = timeframe;
            document.getElementById("engine-terminal").innerHTML += `\n>> [STORY SWITCH]: Controller focus redirected to target object mesh reference: [${targetMeshKey}]`;
            updateEngineCameraRigVectors();
        }

        function updateEngineCameraRigVectors() {
            const activeProfile = document.getElementById("camera-perspective-mode").value;
            const focalTargetMesh = instancedSceneObjectsRegistry[operationalPlayerTargetKey];
            if (!focalTargetMesh) return;

            if (activeProfile === "FPV") {
                coreCamera.position.set(focalTargetMesh.position.x, focalTargetMesh.position.y + 0.8, focalTargetMesh.position.z);
                const lookVec = new THREE.Vector3(
                    Math.sin(mouseYawAngle) * Math.cos(mousePitchAngle),
                    Math.sin(mousePitchAngle),
                    Math.cos(mouseYawAngle) * Math.cos(mousePitchAngle)
                ).normalize();
                coreCamera.lookAt(new THREE.Vector3().copy(coreCamera.position).add(lookVec));
            } else {
                const radius = 30;
                coreCamera.position.x = focalTargetMesh.position.x + radius * Math.sin(mouseYawAngle) * Math.cos(mousePitchAngle);
                coreCamera.position.y = focalTargetMesh.position.y + 10 + radius * Math.sin(mousePitchAngle);
                coreCamera.position.z = focalTargetMesh.position.z + radius * Math.cos(mouseYawAngle) * Math.cos(mousePitchAngle);
                coreCamera.lookAt(focalTargetMesh.position.x, focalTargetMesh.position.y + 0.5, focalTargetMesh.position.z);
            }
        }

        function switchViewportPerspective() { updateEngineCameraRigVectors(); }
        function compileEngineScriptsV95() { document.getElementById("engine-terminal").innerHTML += "\n>> Gojoma Script Stack Verification Successful."; }

        // --- 5. GLOBAL FRAME ENGINE lifecycle STEP TICKER ---
        let previousClockTime = performance.now();
        updateEngineCameraRigVectors();

        function frameStepLifecycleTicker() {
            requestAnimationFrame(frameStepLifecycleTicker);
            
            const currentClockTime = performance.now();
            const elapsedDeltaSeconds = (currentClockTime - previousClockTime) / 1000;
            previousClockTime = currentClockTime;

            if (takeoverActiveFlag) {
                takeoverTimerCountdown -= elapsedDeltaSeconds;
                document.getElementById("takeover-hud-label").innerText = `PLAYABLE TRANSITION ACTIVE: ${takeoverTimerCountdown.toFixed(1)}s`;
                document.getElementById("takeover-hud-label").style.color = "var(--accent-green)";
                
                if (takeoverTimerCountdown <= 0) {
                    takeoverActiveFlag = false;
                    operationalPlayerTargetKey = "hero";
                    document.getElementById("takeover-hud-label").innerText = "SYSTEM NOMINAL";
                    document.getElementById("takeover-hud-label").style.color = "var(--accent-blue)";
                    document.getElementById("engine-terminal").innerHTML += `\n>> [HIJACK ENDED]: Control restored to baseline player mesh profile.`;
                    updateEngineCameraRigVectors();
                }
            }

            engineRenderer.render(masterScene, coreCamera);
        }
        frameStepLifecycleTicker();
    </script>
</body>
</html>
