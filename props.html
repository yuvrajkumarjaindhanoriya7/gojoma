<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojoma Global Prop Factory Suite v10.0</title>
    <style>
        :root {
            --bg-base: #020306;
            --bg-surface: #0a0d18;
            --bg-input: #010204;
            --accent-purple: #a855f7;
            --accent-blue: #38bdf8;
            --accent-green: #00ff66;
            --text-main: #94a3b8;
            --text-bright: #ffffff;
            --border: #1e293b;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-base);
            font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR CATEGORY CONTROLS */
        #factory-sidebar {
            width: 380px; background: var(--bg-surface); border-right: 2px solid var(--border);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        .sidebar-section { padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .sidebar-section h1 { margin: 0; font-size: 13px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 1px; }
        
        .scroll-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; }
        
        .select-box, .input-box {
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-bright); padding: 8px 12px; font-size: 12px; border-radius: 4px; outline: none;
        }
        .select-box:focus, .input-box:focus { border-color: var(--accent-purple); }

        .btn {
            background: var(--accent-purple); color: white; border: none;
            padding: 10px 14px; border-radius: 4px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .btn:hover { background: #9333ea; }
        .btn-blue { background: var(--accent-blue); color: #000; }
        .btn-blue:hover { background: #0ea5e9; }

        /* PREVIEW VIEWPORT WORKSPACE */
        #viewport-container { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; gap: 15px; }
        .viewport-header { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; display: flex; justify-content: space-between; }
        #canvas-3d-frame { flex: 1; background: #000; border-radius: 6px; border: 1px solid var(--border); position: relative; }
        
        #individual-file-output {
            height: 160px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--accent-green); font-family: monospace;
            font-size: 12px; padding: 12px; resize: none; outline: none; line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="factory-sidebar">
        <div class="sidebar-section">
            <h1>Gojoma Global Prop Factory</h1>
        </div>
        
        <div class="scroll-container">
            <div class="form-group">
                <label>Select Category Layer</label>
                <select id="prop-category-select" class="select-box" onchange="populateSubItems()">
                    <option value="URBAN_STREET">Urban / Street Props (Lights, Benches, Hydrants)</option>
                    <option value="TERRAIN_GROUND">Terrain &amp; Ground (Meshes, Roads, Cliffs)</option>
                    <option value="VEGETATION">Vegetation (Trees, Bushes, Lily Pads)</option>
                    <option value="ARCHITECTURE">Structures &amp; Architecture (Walls, Bridges)</option>
                    <option value="INTERIOR_INDOOR">Interior / Indoor (Furniture, Electronics)</option>
                    <option value="INDUSTRIAL_MILITARY">Industrial / Military (Drums, Bunkers)</option>
                    <option value="LIGHTING_PROPS">Lighting Elements (Neon, Torches)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Target Prop Item</label>
                <select id="prop-subitem-select" class="select-box" onchange="updateProceduralMeshPreview()">
                    </select>
            </div>

            <div class="form-group">
                <label>Asset Runtime Variable File Name</label>
                <input type="text" id="prop-filename-input" class="input-box" value="street_light_mod">
            </div>

            <div class="form-group">
                <label>Structural Render Color</label>
                <select id="prop-color-select" class="select-box" onchange="updateProceduralMeshPreview()">
                    <option value="0x64748b">Urban Concrete Slate (Grey)</option>
                    <option value="0x15803d">Forest Vegetation (Green)</option>
                    <option value="0xb91c1c">Industrial / Warning Core (Red)</option>
                    <option value="0xd97706">Timber / Ground Track (Amber)</option>
                </select>
            </div>

            <button class="btn" onclick="generateIsolatedFileStream()">Construct Prop Manifest</button>
            <button class="btn btn-blue" onclick="downloadIsolatedFileManifest()">Download Separate Asset File (.gs)</button>
        </div>
    </div>

    <div id="viewport-container">
        <div class="viewport-header">
            <span>Dynamic Architectural Asset Blueprint Viewport</span>
            <span id="file-indicator" style="color:var(--accent-blue);">Active Output File: street_light_mod.gs</span>
        </div>
        <div id="canvas-3d-frame"></div>
        
        <div class="viewport-header">Isolated File Code Stream Target (.gs)</div>
        <textarea id="individual-file-output" readonly spellcheck="false">// Select asset parameters and execute construction routines...</textarea>
    </div>

    <script>
        // --- 1. FULL ASSET CATEGORY ARCHETYPE INDEXATION MATRIX ---
        const structuralCategoryTree = {
            URBAN_STREET: ["street_light", "traffic_light", "bench", "bus_stop", "dumpster", "trash_can", "mailbox", "fire_hydrant", "barrier", "cone", "manhole_cover", "power_pole"],
            TERRAIN_GROUND: ["ground_tile", "cliff_face", "rock_formation", "sand_surface", "mud_surface", "snow_surface", "road_track", "dirt_path"],
            VEGETATION: ["tree_oak", "tree_pine", "bush_shrub", "hedge_row", "grass_clump", "flower_weed", "ivy_overlay", "lily_pad"],
            ARCHITECTURE: ["wall_segment", "fence_gate", "bridge_staircase", "ladder_rig", "ruins_rubble", "pillar_arch"],
            INTERIOR_INDOOR: ["table_desk", "chair_sofa", "shelf_cabinet", "locker_unit", "bed_mattress", "computer_monitor", "crate_box"],
            INDUSTRIAL_MILITARY: ["shipping_container", "oil_drum", "fuel_tank", "generator_transformer", "sandbag_barricade", "barbed_wire", "watchtower_bunker"],
            LIGHTING_PROPS: ["lantern_torch", "candle", "spotlight_flood", "neon_sign", "billboard_light"]
        };

        // --- 2. THREE.JS VISUAL SCENE BLUEPRINT FIELD SETUP ---
        const canvasContainer = document.getElementById("canvas-3d-frame");
        const masterScene = new THREE.Scene(); masterScene.background = new THREE.Color(0x020306);
        const engineCam = new THREE.PerspectiveCamera(45, (window.innerWidth - 420) / (window.innerHeight - 270), 0.1, 500);
        engineCam.position.set(0, 4, 8); engineCam.lookAt(0, 1, 0);

        const engineRenderer = new THREE.WebGLRenderer({ antialias: true });
        engineRenderer.setSize(window.innerWidth - 420, window.innerHeight - 270);
        canvasContainer.appendChild(engineRenderer.domElement);

        masterScene.add(new THREE.AmbientLight(0xffffff, 0.45));
        const overheadSunlight = new THREE.DirectionalLight(0xffffff, 1.3); overheadSunlight.position.set(10, 25, 10); masterScene.add(overheadSunlight);
        masterScene.add(new THREE.GridHelper(30, 30, 0xa855f7, 0x1e293b));

        let runtimeActivePropMesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0x64748b}));
        masterScene.add(runtimeActivePropMesh);

        // --- 3. DYNAMIC CONTROL ARRAY INTERFACING INTERACTION RUNTIME ---
        function populateSubItems() {
            const currentCategory = document.getElementById("prop-category-select").value;
            const subSelector = document.getElementById("prop-subitem-select");
            subSelector.innerHTML = "";

            structuralCategoryTree[currentCategory].forEach(item => {
                const opt = document.createElement("option");
                opt.value = item;
                opt.innerText = item.replace(/_/g, " ").toUpperCase();
                subSelector.appendChild(opt);
            });

            // Auto sync default filenames to help organize files clearly
            document.getElementById("prop-filename-input").value = `${subSelector.value}_mod`;
            updateProceduralMeshPreview();
        }

        function updateProceduralMeshPreview() {
            masterScene.remove(runtimeActivePropMesh);
            
            const selectedItem = document.getElementById("prop-subitem-select").value;
            const hexColor = parseInt(document.getElementById("prop-color-select").value);
            const activeMat = new THREE.MeshStandardMaterial({ color: hexColor, roughness: 0.5 });

            // Generate procedural proxy forms matching target selections
            if (selectedItem.includes("light") || selectedItem.includes("pole")) {
                const combinedGroup = new THREE.Group();
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 3.5, 8);
                const poleMesh = new THREE.Mesh(poleGeo, activeMat); poleMesh.position.y = 1.75;
                const headGeo = new THREE.BoxGeometry(0.6, 0.3, 0.8);
                const headMesh = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xf59e0b}));
                headMesh.position.set(0, 3.5, 0.3);
                combinedGroup.add(poleMesh, headMesh);
                runtimeActivePropMesh = combinedGroup;
            } 
            else if (selectedItem.includes("wall") || selectedItem.includes("barrier") || selectedItem.includes("container")) {
                runtimeActivePropMesh = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.8, 0.4), activeMat);
                runtimeActivePropMesh.position.y = 0.9;
            } 
            else if (selectedItem.includes("ground") || selectedItem.includes("surface") || selectedItem.includes("tile")) {
                runtimeActivePropMesh = new THREE.Mesh(new THREE.BoxGeometry(4.0, 0.1, 4.0), activeMat);
                runtimeActivePropMesh.position.y = 0.05;
            } 
            else if (selectedItem.includes("tree")) {
                const treeGroup = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5), new THREE.MeshStandardMaterial({color:0x78350f}));
                trunk.position.y = 0.75;
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2.5, 8), activeMat);
                leaves.position.y = 2.5;
                treeGroup.add(trunk, leaves);
                runtimeActivePropMesh = treeGroup;
            }
            else {
                // Stand-in proxy block for basic props
                runtimeActivePropMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 1.2), activeMat);
                runtimeActivePropMesh.position.y = 0.5;
            }

            masterScene.add(runtimeActivePropMesh);
            document.getElementById("prop-filename-input").value = `${selectedItem}_mod`;
            document.getElementById("file-indicator").innerText = `Active Output File: ${selectedItem}_mod.gs`;
        }

        // --- 4. ISOLATED SYSTEM EXPORTER GENERATOR ---
        function generateIsolatedFileStream() {
            const category = document.getElementById("prop-category-select").value;
            const targetProp = document.getElementById("prop-subitem-select").value;
            const hexValue = document.getElementById("prop-color-select").value;
            const fileName = document.getElementById("prop-filename-input").value;

            const codeOutputString = `// =======================================================
// GOJOMA ENGINE INDEPENDENT COMPONENT REGISTER MODULE
// SOURCE GENERATOR MATRIX: PROP FACTORY v10.0
// TARGET COMPILE LINK: ${fileName}.gs
// =======================================================

define prop_blueprint named "${targetProp}_instance" :
    set environmental_layer ${category}
    set mesh_blueprint_form PROCEDURAL_PRIMITIVE
    set default_material_hex ${hexValue}
    set baked_shadow_casting TRUE
    set static_physics_boundary IMPASSABLE_OBSTACLE

// --- SYSTEM COLLISION MATRIX RULES ---
if hero interact ${targetProp}_instance :
    execute environmental_sound_hook play_spatial("prop_impact_sub.mp3")`;

            document.getElementById("individual-file-output").value = codeOutputString;
        }

        function downloadIsolatedFileManifest() {
            generateIsolatedFileStream();
            const textContent = document.getElementById("individual-file-output").value;
            const fileName = document.getElementById("prop-filename-input").value;
            
            const fileBlob = new Blob([textContent], { type: "text/plain" });
            const temporaryAnchorNode = document.createElement("a");
            temporaryAnchorNode.download = `${fileName}.gs`;
            temporaryAnchorNode.href = window.URL.createObjectURL(fileBlob);
            temporaryAnchorNode.click();
        }

        // Global lifecycle layout steps ticker
        function frameAnimationLoop() {
            requestAnimationFrame(frameAnimationLoop);
            runtimeActivePropMesh.rotation.y += 0.006;
            engineRenderer.render(masterScene, engineCam);
        }

        populateSubItems();
        frameAnimationLoop();

        window.addEventListener('resize', () => {
            const w = window.innerWidth - 420; const h = window.innerHeight - 270;
            engineCam.aspect = w / h; engineCam.updateProjectionMatrix();
            engineRenderer.setSize(w, h);
        });
    </script>
</body>
</html>
