<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gojoma Engine - AAA Prop Studio &amp; Optimizer</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020406; font-family: 'Segoe UI', system-ui, sans-serif; color: #cbd5e1; overflow: hidden; user-select: none; }
        
        #prop-header-nav { height: 45px; background: #0b0e14; border-bottom: 2px solid #00adb5; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        .branding { font-weight: bold; font-size: 13px; color: #00adb5; letter-spacing: 1px; text-transform: uppercase; }
        .poly-count-badge { background: #1e293b; color: #00ff66; font-family: monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        #prop-workspace-split { display: flex; flex-direction: column; height: calc(100vh - 45px); }
        #prop-render-viewport { flex-grow: 1; background: #010203; position: relative; }
        
        /* ADJUSTMENT PANEL SHEET */
        #prop-modifier-dashboard { height: 280px; background: #07090e; border-top: 1px solid #1e293b; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; gap: 8px; }
        .panel-title { font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: bold; letter-spacing: 0.5px; border-bottom: 1px solid #141822; padding-bottom: 3px; }
        
        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .control-row label { font-size: 11px; font-weight: bold; width: 120px; color: #94a3b8; text-transform: uppercase; }
        .prop-slider { flex-grow: 1; accent-color: #00adb5; background: #1e293b; height: 5px; border-radius: 3px; outline: none; }

        .flex-buttons { display: flex; gap: 6px; margin-bottom: 4px; }
        .prop-btn { flex: 1; background: #11141d; border: 1px solid #1e293b; color: #cbd5e1; padding: 8px 4px; font-size: 10px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .prop-btn:active { background: #1e293b; border-color: #00adb5; }
        .btn-bake { background: #00adb5; color: #020406; border: none; }
        .btn-bake:active { background: #38bdf8; }

        #prop-debugger-console { background: #010204; border: 1px solid #131722; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #38bdf8; min-height: 45px; max-height: 55px; overflow-y: auto; white-space: pre-wrap; margin-top: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="prop-header-nav">
        <span class="branding">Gojoma AAA Prop Matrix Factory</span>
        <span id="live-poly-badge" class="poly-count-badge">Vertices: 480 (Max Quality)</span>
    </div>

    <div id="prop-workspace-split">
        <div id="prop-render-viewport"></div>
        
        <div id="prop-modifier-dashboard">
            <div class="panel-title">1. Base Asset Geometry Template</div>
            <div class="flex-buttons">
                <button class="prop-btn" onclick="generateBasePropStructure('barrel')">Industrial Oil Barrel</button>
                <button class="prop-btn" onclick="generateBasePropStructure('scaffold')">Concrete Pillar Pillar</button>
                <button class="prop-btn" onclick="generateBasePropStructure('crate')">Supply Loot Crate</button>
            </div>

            <div class="panel-title">2. Real-Time Hardware Optimization &amp; LOD Engine</div>
            <div class="control-row">
                <label>Mesh Decimation (LOD)</label>
                <input type="range" class="prop-slider" id="slider-lod" min="0" max="2" step="1" value="0" oninput="applyLivePropOptimizationPipeline()">
            </div>
            <div class="control-row">
                <label>Surface Wear &amp; Tear</label>
                <input type="range" class="prop-slider" id="slider-wear" min="0" max="1" step="0.05" value="0.2" oninput="applyLivePropOptimizationPipeline()">
            </div>

            <div class="panel-title">3. Production Asset Packing</div>
            <div class="flex-buttons">
                <button class="prop-btn btn-bake" style="width: 100%;" onclick="bakePropAssetToGameMemory()">Bake Mesh &amp; Generate Collision Hull (Hitbox)</button>
            </div>

            <div id="prop-debugger-console">>> Prop Pipeline online. Select a template to initialize AAA geometry trace paths...</div>
        </div>
    </div>

    <script>
        // --- 1. SETUP GRAPHICS VIEWPORT ENGINE ---
        const viewport = document.getElementById("prop-render-viewport");
        const propScene = new THREE.Scene(); propScene.background = new THREE.Color(0x040509);
        
        const propCamera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight - 325), 0.1, 1000);
        propCamera.position.set(0, 2.5, 4.5); propCamera.lookAt(0, 0.4, 0);
        
        const propRenderer = new THREE.WebGLRenderer({ antialias: true });
        propRenderer.setSize(window.innerWidth, window.innerHeight - 325);
        viewport.appendChild(propRenderer.domElement);

        // Studio lighting rig to catch metallic scratches & roughness reflections
        propScene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const studioSun = new THREE.DirectionalLight(0xffffff, 1.5); studioSun.position.set(5, 10, 6); propScene.add(studioSun);
        propScene.add(new THREE.GridHelper(30, 15, 0x00adb5, 0x121622));

        // --- 2. PROP STRUCTURAL TRACKING MATRICES ---
        let currentPropActiveGroup = null;
        let currentPropTypeKey = "barrel";
        const debugLog = document.getElementById("prop-debugger-console");
        const polyBadge = document.getElementById("live-poly-badge");

        function purgePreviousPropCache() {
            if (currentPropActiveGroup) {
                propScene.remove(currentPropActiveGroup);
                currentPropActiveGroup = null;
            }
        }

        // --- 3. THE AAA LEVEL-OF-DETAIL (LOD) MESH COMPRESSION ENGINE ---
        function generateBasePropStructure(propTypeKeyString) {
            purgePreviousPropCache();
            currentPropTypeKey = propTypeKeyString;
            
            currentPropActiveGroup = new THREE.Group();
            const lodIndexValue = parseInt(document.getElementById("slider-lod").value);
            const wearFactorValue = parseFloat(document.getElementById("slider-wear").value);

            // Procedural AAA PBR Material Simulation
            const pbrPropMaterial = new THREE.MeshStandardMaterial({
                color: (propTypeKeyString === 'barrel') ? 0xb91c1c : (propTypeKeyString === 'scaffold' ? 0x64748b : 0xd97706),
                roughness: wearFactorValue, // High wear changes light scatter properties
                metalness: (propTypeKeyString === 'crate') ? 0.1 : 0.85
            });

            let coreGeometryBlock;

            // DYNAMIC POLYGON STRIPPING OVERRIDE (Based on Level of Detail Selection)
            if (propTypeKeyString === "barrel") {
                if (lodIndexValue === 0) {
                    coreGeometryBlock = new THREE.CylinderGeometry(0.4, 0.4, 1.1, 32); // Max Quality (High-poly desktop)
                    polyBadge.innerText = "Vertices: 480 (AAA High LOD)";
                } else if (lodIndexValue === 1) {
                    coreGeometryBlock = new THREE.CylinderGeometry(0.4, 0.4, 1.1, 12); // Medium Quality (Mid laptop)
                    polyBadge.innerText = "Vertices: 180 (Balanced LOD 1)";
                } else {
                    coreGeometryBlock = new THREE.BoxGeometry(0.7, 1.1, 0.7); // Potato PC Mode (Flat bounding block box)
                    polyBadge.innerText = "Vertices: 8 (Potato Low LOD 2)";
                }
            } 
            else if (propTypeKeyString === "scaffold") {
                if (lodIndexValue === 0) {
                    coreGeometryBlock = new THREE.IcosahedronGeometry(0.5, 3);
                    polyBadge.innerText = "Vertices: 642 (AAA High LOD)";
                } else if (lodIndexValue === 1) {
                    coreGeometryBlock = new THREE.IcosahedronGeometry(0.5, 1);
                    polyBadge.innerText = "Vertices: 120 (Balanced LOD 1)";
                } else {
                    coreGeometryBlock = new THREE.BoxGeometry(0.7, 0.7, 0.7);
                    polyBadge.innerText = "Vertices: 8 (Potato Low LOD 2)";
                }
            }
            else if (propTypeKeyString === "crate") {
                // Crates are inherently cubic, decimation alters chamfer / texture fidelity mapping bounds
                coreGeometryBlock = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                polyBadge.innerText = (lodIndexValue === 0) ? "Vertices: 8 (Max Texture Mapping)" : "Vertices: 8 (Optimized Sample Rates)";
            }

            const finalInstantiatedMesh = new THREE.Mesh(coreGeometryBlock, pbrPropMaterial);
            finalInstantiatedMesh.position.y = 0.4;
            currentPropActiveGroup.add(finalInstantiatedMesh);
            
            propScene.add(currentPropActiveGroup);
            debugLog.innerHTML = `>> Prop Engine: Spawned '${propTypeKeyString}' template. Mesh parameters compiled inside current frame window.`;
        }

        function applyLivePropOptimizationPipeline() {
            if (!currentPropActiveGroup) return;
            // Re-instantiate mesh instantly with newly assigned LOD structural segments count values
            generateBasePropStructure(currentPropTypeKey);
        }

        // --- 4. COLLISION HULL (HITBOX) GENERATOR & PACKER ---
        function bakePropAssetToGameMemory() {
            if (!currentPropActiveGroup) {
                debugLog.innerHTML = "<span style='color:#ff2e63;'>>> Operation Aborted: Viewport buffer is empty! Choose a template first.</span>";
                return;
            }

            const currentLODLevel = document.getElementById("slider-lod").value;
            
            // Build absolute simplified collision tracking maps parameters (Box bounding hulls protect CPU tracking runtime lag cost)
            const compiledPropDataDataStruct = {
                propReferenceID: "prop_aaa_" + currentPropTypeKey + "_baked",
                activeBakedLODTier: currentLODLevel,
                collisionHullType: "AABB_BOX_HITBOX", // Axis-Aligned Bounding Box (High performance safe mode physics model)
                physicsMassConfig: (currentPropTypeKey === 'barrel') ? 45.0 : 200.0
            };

            debugLog.innerHTML = `<span style='color:#00ff66; font-weight:bold;'>>> PRO_BAKE COMPLETED SUCCESSFULLY!\n>> Packed Hull Register: ID: ${compiledPropDataDataStruct.propReferenceID} | LOD Tier: ${compiledPropDataDataStruct.activeBakedLODTier} | Collision Engine Status: Dynamic Hitbox Generated! Ready for asset pipeline calls.</span>`;
        }

        // --- 5. RENDER LOOP REFRESH TICK ---
        generateBasePropStructure("barrel"); // Startup baseline focus target element

        function propStudioFrameTickLoop() {
            requestAnimationFrame(propStudioFrameTickLoop);
            if (currentPropActiveGroup) {
                currentPropActiveGroup.rotation.y += 0.01;
            }
            propRenderer.render(propScene, propCamera);
        }
        propStudioFrameTickLoop();

        window.addEventListener('resize', () => {
            propCamera.aspect = window.innerWidth / (window.innerHeight - 325);
            propCamera.updateProjectionMatrix();
            propRenderer.setSize(window.innerWidth, window.innerHeight - 325);
        });
    </script>
</body>
</html>
